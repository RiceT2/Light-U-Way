<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>小呦行</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f172a; color: #fff; }
        .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
        .panel { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .chips { display: flex; flex-wrap: wrap; gap: 10px; }
        .chip { border: none; border-radius: 20px; padding: 10px 16px; background: #38bdf8; color: #082f49; cursor: pointer; font-weight: 600; }
        .chip.secondary { background: #a78bfa; color: #1e1b4b; }
        .chip:active { transform: scale(0.98); }
        .hint { color: #cbd5e1; font-size: 14px; }
        .hide { display: none; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>小呦行 · 点击式 AI 旅游小助手</h1>
    <div class="panel">
        <h2 id="welcome">Hello，你想去哪儿玩？</h2>
        <p class="hint">输入是次入口，默认全程点击推进。</p>
        <div class="chips" id="destinations"></div>
    </div>

    <div class="panel hide" id="step-time">
        <h3>你想什么时候出发？</h3>
        <div class="chips" id="timeSlots">
            <button class="chip secondary" data-time="2026-05-20 09:30">5月20日 09:30</button>
            <button class="chip secondary" data-time="2026-05-20 14:00">5月20日 14:00</button>
            <button class="chip secondary" data-time="2026-05-21 08:30">5月21日 08:30</button>
        </div>
    </div>

    <div class="panel hide" id="step-plan">
        <h3>一键生成行程</h3>
        <div class="chips">
            <button class="chip" id="generatePlanBtn">生成板式行程</button>
        </div>
    </div>

    <div class="panel" id="result">
        <strong>状态：</strong>等待选择目的地。
    </div>
</div>
<script>
    var selectedDestination = null;
    var selectedTime = null;

    function setStatus(html) {
        document.getElementById('result').innerHTML = '<strong>状态：</strong>' + html;
    }

    fetch('/api/bootstrap').then(function (r) { return r.json(); }).then(function (d) {
        document.getElementById('welcome').textContent = d.welcome;
        var container = document.getElementById('destinations');
        d.quickDestinations.forEach(function (city) {
            var btn = document.createElement('button');
            btn.className = 'chip';
            btn.innerText = city;
            btn.onclick = function () {
                selectedDestination = city;
                document.getElementById('step-time').classList.remove('hide');
                setStatus('已选择目的地「' + city + '」，请点击出发时间。');
            };
            container.appendChild(btn);
        });
    });

    document.querySelectorAll('#timeSlots .chip').forEach(function (btn) {
        btn.onclick = function () {
            selectedTime = btn.getAttribute('data-time');
            document.getElementById('step-plan').classList.remove('hide');
            setStatus('出发时间已选「' + selectedTime + '」，可点击生成行程。');
        };
    });

    document.getElementById('generatePlanBtn').onclick = function () {
        if (!selectedDestination || !selectedTime) {
            setStatus('请先完成目的地与时间点击。');
            return;
        }
        fetch('/api/plan/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({destination: selectedDestination, departureTime: selectedTime, hotelBudget: 300})
        }).then(function (r) { return r.json(); }).then(function (data) {
            setStatus(data.summary + '<br/>交通: ' + data.transportOptions.join('；') + '<br/>酒店: ' + data.hotelOptions.join('；'));
        });
    };
</script>
</body>
</html>
